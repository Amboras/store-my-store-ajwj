name: Build Storefront Template

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd storefront && bun install --frozen-lockfile

      - name: Create template archive
        run: tar -czf storefront-template.tar.gz -C storefront .

      - name: Upload as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: template-latest
          name: Storefront Template (latest)
          files: storefront-template.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
